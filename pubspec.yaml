name: appdulich
description: "Dự án App Du Lịch - Nhóm 10"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  provider: ^6.1.2
  image_picker: ^1.2.2
  http: ^1.6.0
  url_launcher: ^6.3.2

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/auth/
    - assets/images/travel/Da_Lat/
    - assets/images/travel/Da_Nang/
    - assets/images/travel/Ha_Giang/
    - assets/images/travel/Ha_Long/
    - assets/images/travel/Hoi_An/
    - assets/images/travel/Hue/
    - assets/images/travel/Nha_Trang/
    - assets/images/travel/Ninh_Binh/
    - assets/images/travel/Phu_Quoc/
    - assets/images/travel/Quy_Nhon/
    - assets/images/travel/Sa_Pa/